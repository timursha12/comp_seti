<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Форма регистрации</title>
  </head>
  <body>
    <form name="forma1">
      <table>
        <tr>
          <td colspan="2" align="center">Форма регистрации<br><br></td>
        </tr>
        <tr>
          <td align="right">Имя</td>
          <td><input type="text" name="fio" size="30"></td>
        </tr>
        <tr>
          <td align="right">e-mail</td>
          <td><input type="text" name="email" size="30"></td>
        </tr>
        <tr>
          <td align="right">Пароль</td>
          <td><input type="password" name="pass1" size="30"></td>
        </tr>
        <tr>
          <td align="right">Повтор пароля</td>
          <td><input type="password" name="pass2" size="30"></td>
        </tr>
        <tr>
          <td align="right">Пол</td>
          <td>
            <input type="radio" name="pol" value="M" checked> мужской
            <input type="radio" name="pol" value="W"> женский
          </td>
        </tr>
        <tr>
          <td align="right" valign="top">Увлечения</td>
          <td>
            <select name="hobby" size="7" multiple>
            <option selected value="comp">компьютеры
            <option value="sport">спорт
            <option value="games">игры
            <option value="animals">животные
            <option value="auto">автомобили
            <option value="clubs">клубы
            <option value="music">музыка
            </select>
          </td>
        </tr>
        <tr>
          <td align="right" valign="top">Ваши пожелания</td>
          <td><textarea name="wishes" cols="32" rows="4"></textarea></td>
        </tr>
        <tr>
         <td></td>
          <td>
            <input type="submit" name="b1" value="Отправить">
            <input type="reset" name="r1" value="Очистить">
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
